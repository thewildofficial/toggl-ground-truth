<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, sans-serif; background: #0c0d10; color: #e8eaf0; padding: 24px; max-width: 500px; }
  h2 { font-size: 1.1rem; margin: 0 0 16px; }
  label { font-size: 0.75rem; color: #9aa0ad; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 4px; margin-top: 16px; }
  input { width: 100%; background: #1e2128; color: #e8eaf0; border: none; border-radius: 6px; padding: 8px; font-size: 0.85rem; }
  .btn { background: #60a5fa; color: #0c0d10; border: none; border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
  .note { font-size: 0.8rem; color: #6b7280; margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>
  <h2>Ground Truth Daemon Settings</h2>
  <label>API Base URL</label>
  <input id="api-base" value="http://localhost">
  <p class="note">The Flask backend URL where screen time data is sent.</p>

  <label>Poll interval (seconds)</label>
  <input id="poll-interval" type="number" value="5" min="1" max="60">
  <p class="note">How often to check the active tab. 5s is recommended.</p>

  <button class="btn" id="save">Save Settings</button>
  <p class="note" id="saved-msg" style="display:none">Saved! Reload the extension to apply.</p>

  <script src="options.js"></script>
</body>
</html>
