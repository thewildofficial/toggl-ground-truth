# Stated preferences → ground truth tracking
# Time logged in Toggl with matching keywords counts toward the goal.
# No checkbox. No manual input. Automatic from Toggl data.

goals:
  meditation:
    target_mins: 10
    tier: non-negotiable
    keywords: [meditate, meditation, breathe]
    icon: 🧘
    color: "#22c55e"

  language:
    target_mins: 15
    tier: non-negotiable
    keywords: [duolingo, arabic, language, learn arabic]
    icon: 🗣️
    color: "#22c55e"

  reading:
    target_mins: 30
    tier: non-negotiable
    keywords: [read, reading, readest, book, kindle, epub]
    icon: 📖
    color: "#22c55e"

  research:
    target_mins: 90
    tier: high-ideal
    keywords:
      - research
      - mech interp
      - mechanistic
      - interpretability
      - probe bank
      - alignment
      - mi tutorial
      - socratic mi
      - reversible activations
      - esa-arch
      - learnmechint
      - mechint
      - CS221M
      - cs221m
      - Stanford MI
      - causal abstraction
      - DAS
      - distributed alignment search
      - causal mediation
      - activation patching
      - sparse autoencoder
      - SAE
      - circuit tracing
      - steering vector
      - nullspace projection
      - interchange intervention
    icon: 🔬
    color: "#ef4444"

  learning:
    target_mins: 60
    tier: high-ideal
    keywords:
      - opencourseware
      - mit
      - course
      - lecture
      - fear and trembling
      - reading
      - readest
      - book
      - power of awareness
      - goddard
      - spinoza
      - kabbalah
    icon: 📚
    color: "#ef4444"

  fitness:
    target_mins: 30
    tier: foundation
    keywords: [gym, walk, pray, deadlift, farmers, trap bar, workout]
    icon: 💪
    color: "#eab308"

  # ---- MINIMIZE GOALS: less time = higher score ----
  # Negative feedback loop. 0 minutes = score 1.0 (perfect). cap = score 0.0.
  # Fed by Toggl tax entries + browser extension screen-time logging.
  doom_scroll:
    type: minimize
    cap_mins: 30
    tier: non-negotiable
    keywords: [doom scroll, doomscroll, x scroll, phone, idle, waste, procrastinate, brainrot, short form, shorts, reels]
    color: "#ef4444"

  youtube:
    type: minimize
    cap_mins: 60
    tier: high-ideal
    keywords: [youtube]
    color: "#f87171"

  social_media:
    type: minimize
    cap_mins: 45
    tier: high-ideal
    keywords: [x scroll, twitter, instagram, tiktok, reels, shorts]
    color: "#fbbf24"

  porn:
    type: minimize
    cap_mins: 0
    tier: non-negotiable
    keywords: [goon, coom]
    color: "#dc2626"

# These keywords mark entries as "maintenance" (school/exam/work obligations).
# Tracked separately so they don't subsidize high-ideal goals.
maintenance_keywords:
  - exam
  - final
  - prep
  - grind
  - dbms
  - os
  - operating system
  - data analytics
  - study
  - assignment
  - homework
  - quiz
  - internals

# Productivity tax: activities that match zero goals and zero maintenance.
# Tracked to show unproductive time that could've gone to goals.
tax_keywords:
  - youtube
  - doom scroll
  - doomscroll
  - netflix
  - tiktok
  - instagram
  - twitter
  - x scroll
  - phone
  - idle
  - doing nothing
  - lying down
  - waste
  - procrastinate
  - goon
  - coom
  - brainrot
  - short form
  - shorts
  - reels
